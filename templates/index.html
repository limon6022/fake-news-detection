<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake News Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }

    textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1rem;
      color: #e2e8f0;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 150px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #38bdf8; }
    textarea::placeholder { color: #475569; }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(90deg, #0ea5e9, #6366f1);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 1.8rem;
      display: none;
    }

    .verdict {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      padding: 1.2rem;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .verdict.FAKE {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .verdict.REAL {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .confidence-label {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
    }

    .bars { display: flex; flex-direction: column; gap: 0.6rem; }

    .bar-row { display: flex; align-items: center; gap: 0.8rem; font-size: 0.85rem; }

    .bar-label { width: 40px; color: #94a3b8; }

    .bar-track {
      flex: 1;
      background: #0f172a;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    .bar-fill.fake { background: #ef4444; }
    .bar-fill.real { background: #22c55e; }

    .bar-pct { width: 42px; text-align: right; color: #cbd5e1; }

    .error-msg {
      color: #f87171;
      font-size: 0.88rem;
      margin-top: 0.6rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔍 Fake News Detector</h1>
    <p class="subtitle">Powered by Random Forest · 96% accuracy · WELFake dataset</p>

    <textarea id="newsInput" placeholder="Paste a news headline or article here..."></textarea>
    <p class="error-msg" id="errorMsg"></p>

    <button id="analyzeBtn" onclick="analyze()">Analyze</button>

    <div class="result" id="result">
      <div class="verdict" id="verdict"></div>
      <p class="confidence-label" id="confLabel"></p>
      <div class="bars">
        <div class="bar-row">
          <span class="bar-label">Real</span>
          <div class="bar-track"><div class="bar-fill real" id="realBar" style="width:0%"></div></div>
          <span class="bar-pct" id="realPct">0%</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">Fake</span>
          <div class="bar-track"><div class="bar-fill fake" id="fakeBar" style="width:0%"></div></div>
          <span class="bar-pct" id="fakePct">0%</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function analyze() {
      const text = document.getElementById("newsInput").value.trim();
      const btn = document.getElementById("analyzeBtn");
      const errEl = document.getElementById("errorMsg");
      const resultEl = document.getElementById("result");

      errEl.style.display = "none";
      resultEl.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Analyzing...";

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        const data = await res.json();

        if (data.error) {
          errEl.textContent = data.error;
          errEl.style.display = "block";
        } else {
          const verdict = document.getElementById("verdict");
          verdict.textContent = data.label === "FAKE" ? "🔴 FAKE NEWS" : "🟢 REAL NEWS";
          verdict.className = "verdict " + data.label;

          document.getElementById("confLabel").textContent =
            `Confidence: ${data.confidence}%`;

          document.getElementById("realBar").style.width = data.real_prob + "%";
          document.getElementById("fakeBar").style.width = data.fake_prob + "%";
          document.getElementById("realPct").textContent = data.real_prob + "%";
          document.getElementById("fakePct").textContent = data.fake_prob + "%";

          resultEl.style.display = "block";
        }
      } catch (e) {
        errEl.textContent = "Server error. Make sure Flask is running.";
        errEl.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Analyze";
    }

    document.getElementById("newsInput").addEventListener("keydown", e => {
      if (e.ctrlKey && e.key === "Enter") analyze();
    });
  </script>
</body>
</html>
